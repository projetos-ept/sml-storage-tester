<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SML Storage — Teste de Upload</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #4fd1c5;
    --text: #e2e0ff;
    --muted: #6b6a8a;
    --success: #4fd1c5;
    --error: #f87171;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(124,106,247,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(79,209,197,0.06) 0%, transparent 60%);
  }

  .container {
    width: 100%;
    max-width: 560px;
  }

  .header {
    margin-bottom: 2.5rem;
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .badge::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.5rem;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .field {
    margin-bottom: 1rem;
  }

  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
    text-transform: uppercase;
  }

  input[type="text"], input[type="url"], input[type="file"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.65rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus, input[type="url"]:focus {
    border-color: var(--accent);
  }

  input[type="file"] {
    cursor: pointer;
    padding: 0.5rem 0.9rem;
    font-family: var(--sans);
    font-size: 0.8rem;
  }

  input[type="file"]::file-selector-button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 5px;
    padding: 0.3rem 0.75rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    cursor: pointer;
    margin-right: 0.75rem;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
  }

  .preview-wrap {
    width: 100%;
    height: 160px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--bg);
    margin-top: 0.5rem;
  }

  .preview-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .preview-empty {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .btn {
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover { background: #6a58e0; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .status {
    margin-top: 1rem;
    border-radius: 8px;
    overflow: hidden;
    display: none;
  }

  .status.show { display: block; }

  .status-header {
    padding: 0.6rem 1rem;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .status.success .status-header { background: rgba(79,209,197,0.15); color: var(--success); }
  .status.error .status-header { background: rgba(248,113,113,0.15); color: var(--error); }
  .status.loading .status-header { background: rgba(124,106,247,0.15); color: var(--accent); }

  .status-body {
    padding: 1rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    margin-bottom: 0.6rem;
    font-size: 0.78rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .step:last-child { margin-bottom: 0; }

  .step-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-top: 5px;
    flex-shrink: 0;
  }

  .step.done .step-dot { background: var(--success); }
  .step.active .step-dot { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
  .step.fail .step-dot { background: var(--error); }
  .step.done { color: var(--text); }
  .step.active { color: var(--accent); }
  .step.fail { color: var(--error); }

  .result-link {
    display: block;
    margin-top: 0.75rem;
    padding: 0.75rem;
    background: rgba(79,209,197,0.08);
    border: 1px solid rgba(79,209,197,0.2);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--accent2);
    word-break: break-all;
    text-decoration: none;
  }

  .result-link:hover { background: rgba(79,209,197,0.15); }

  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">sml-storage api tester</div>
    <h1>Upload <span>Tester</span></h1>
    <p class="subtitle">Converte imagem em PDF e envia para o Firebase Storage via API</p>
  </div>

  <!-- Config -->
  <div class="card">
    <div class="card-title">// configuração da api</div>
    <div class="field">
      <label>Endpoint base</label>
      <input type="url" id="endpoint" placeholder="https://us-east1-sml-storage.cloudfunctions.net" value="https://us-east1-sml-storage.cloudfunctions.net">
    </div>
    <div class="field">
      <label>x-api-key</label>
      <input type="text" id="apikey" placeholder="sua-chave-aqui">
    </div>
  </div>

  <!-- Arquivo -->
  <div class="card">
    <div class="card-title">// arquivo & metadados</div>
    <div class="field">
      <label>Imagem (jpg, png, webp)</label>
      <input type="file" id="imgfile" accept="image/*" onchange="previewImg(this)">
      <div class="preview-wrap" id="preview">
        <span class="preview-empty">nenhuma imagem selecionada</span>
      </div>
    </div>
    <div class="grid-2" style="margin-top:1rem">
      <div class="field">
        <label>Projeto</label>
        <input type="text" id="projeto" placeholder="ex: cetep" value="teste">
      </div>
      <div class="field">
        <label>Filename</label>
        <input type="text" id="filename" placeholder="ex: laudo.pdf" value="teste.pdf">
      </div>
    </div>
    <div class="grid-3" style="margin-top:0">
      <div class="field">
        <label>Tag 1</label>
        <input type="text" id="tag1" placeholder="ex: hemograma">
      </div>
      <div class="field">
        <label>Tag 2</label>
        <input type="text" id="tag2" placeholder="ex: urgente">
      </div>
      <div class="field">
        <label>Tag 3</label>
        <input type="text" id="tag3" placeholder="ex: turma-a">
      </div>
    </div>
  </div>

  <button class="btn btn-primary" id="btnUpload" onclick="runUpload()">
    → Converter e Enviar
  </button>

  <div class="status" id="status">
    <div class="status-header" id="statusHeader"></div>
    <div class="status-body" id="statusBody"></div>
  </div>
</div>

<script>
function previewImg(input) {
  const preview = document.getElementById('preview');
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      preview.innerHTML = `<img src="${e.target.result}">`;
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function setStatus(type, title, steps) {
  const el = document.getElementById('status');
  const header = document.getElementById('statusHeader');
  const body = document.getElementById('statusBody');
  el.className = `status show ${type}`;
  const icons = { loading: '<span class="spinner"></span>', success: '✓', error: '✗' };
  header.innerHTML = `${icons[type]} ${title}`;
  body.innerHTML = steps.map(s =>
    `<div class="step ${s.state}"><div class="step-dot"></div><span>${s.text}</span></div>`
  ).join('');
}

function addResultLink(url) {
  const body = document.getElementById('statusBody');
  body.innerHTML += `<a class="result-link" href="${url}" target="_blank">↗ ${url}</a>`;
}

async function runUpload() {
  const endpoint = document.getElementById('endpoint').value.trim().replace(/\/$/, '');
  const apikey   = document.getElementById('apikey').value.trim();
  const projeto  = document.getElementById('projeto').value.trim();
  const filename = document.getElementById('filename').value.trim() || 'upload.pdf';
  const tag1     = document.getElementById('tag1').value.trim();
  const tag2     = document.getElementById('tag2').value.trim();
  const tag3     = document.getElementById('tag3').value.trim();
  const imgFile  = document.getElementById('imgfile').files[0];

  if (!endpoint || !apikey) {
    setStatus('error', 'Configuração incompleta', [{ state: 'fail', text: 'Preencha o endpoint e a x-api-key.' }]);
    return;
  }
  if (!imgFile) {
    setStatus('error', 'Nenhuma imagem', [{ state: 'fail', text: 'Selecione uma imagem para converter.' }]);
    return;
  }

  const btn = document.getElementById('btnUpload');
  btn.disabled = true;

  const steps = [
    { state: 'active', text: 'Convertendo imagem para PDF...' },
    { state: '', text: 'Solicitando URL de upload...' },
    { state: '', text: 'Enviando arquivo para o Storage...' },
    { state: '', text: 'Confirmando upload...' },
  ];
  setStatus('loading', 'Processando...', steps);

  try {
    // 1 — Gerar PDF
    const imgData = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = rej;
      r.readAsDataURL(imgFile);
    });

    const img = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => res(i);
      i.onerror = rej;
      i.src = imgData;
    });

    const { jsPDF } = window.jspdf;
    const isLandscape = img.width > img.height;
    const pdf = new jsPDF({ orientation: isLandscape ? 'landscape' : 'portrait', unit: 'px', format: [img.width, img.height] });
    pdf.addImage(imgData, 'JPEG', 0, 0, img.width, img.height);
    const pdfBlob = pdf.output('blob');

    steps[0].state = 'done';
    steps[0].text = 'PDF gerado (' + (pdfBlob.size / 1024).toFixed(1) + ' KB)';
    steps[1].state = 'active';
    setStatus('loading', 'Processando...', steps);

    // 2 — Pedir signed URL
    const urlRes = await fetch(`${endpoint}/getUploadUrl`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apikey },
      body: JSON.stringify({ projeto, filename: filename.endsWith('.pdf') ? filename : filename + '.pdf', tag1, tag2, tag3 })
    });
    const urlData = await urlRes.json();
    if (!urlData.success) throw new Error(urlData.error || 'Erro ao obter URL');

    steps[1].state = 'done';
    steps[1].text = 'URL de upload obtida';
    steps[2].state = 'active';
    setStatus('loading', 'Processando...', steps);

    // 3 — Upload direto
    const putRes = await fetch(urlData.uploadUrl, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/octet-stream' },
      body: pdfBlob
    });
    if (!putRes.ok) throw new Error(`Falha no upload: HTTP ${putRes.status}`);

    steps[2].state = 'done';
    steps[2].text = 'Arquivo enviado para o Storage';
    steps[3].state = 'active';
    setStatus('loading', 'Processando...', steps);

    // 4 — Confirmar
    const confirmRes = await fetch(`${endpoint}/confirmUpload`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apikey },
      body: JSON.stringify({ docId: urlData.docId })
    });
    const confirmData = await confirmRes.json();
    if (!confirmData.success) throw new Error(confirmData.error || 'Erro na confirmação');

    steps[3].state = 'done';
    steps[3].text = 'Upload confirmado no Firestore';
    setStatus('success', 'Upload concluído com sucesso', steps);
    addResultLink(confirmData.url);

  } catch (err) {
    const failIdx = steps.findIndex(s => s.state === 'active');
    if (failIdx >= 0) { steps[failIdx].state = 'fail'; steps[failIdx].text += ' — ' + err.message; }
    setStatus('error', 'Erro no upload', steps);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
